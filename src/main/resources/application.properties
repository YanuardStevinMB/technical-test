spring.application.name=banca
server.port=8000

#spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:banca}
spring.datasource.url=jdbc:postgresql://localhost:5432/banca

#spring.datasource.username=${DB_USER:banca}
#spring.datasource.password=${DB_PASSWORD:banca}
spring.datasource.username=banca
spring.datasource.password=banca
spring.datasource.hikari.maximum-pool-size=10

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.disable-swagger-default-url=true

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

spring.jackson.time-zone=UTC
spring.jackson.serialization.WRITE_DATES_AS_TIMESTAMPS=false
